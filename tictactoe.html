    <h1>❌⭕ টিক ট্যাক টো</h1>
    <p>দুইজন খেলোয়াড়ের ক্লাসিক গেম! পালাক্রমে খেলো।</p>

    <div class="ttt-container">
        <!-- স্কোর -->
        <div class="ttt-scoreboard">
            <div class="ttt-score">
                <span>❌ Player X</span>
                <span id="scoreX">0</span>
            </div>
            <div class="ttt-score">
                <span>ড্র</span>
                <span id="scoreDraw">0</span>
            </div>
            <div class="ttt-score">
                <span>⭕ Player O</span>
                <span id="scoreO">0</span>
            </div>
        </div>

        <!-- স্ট্যাটাস -->
        <div id="tttStatus" class="ttt-status">❌ Player X-এর পালা</div>

        <!-- গেম বোর্ড -->
        <div class="ttt-board" id="tttBoard">
            <div class="ttt-cell" onclick="makeMove(0)"></div>
            <div class="ttt-cell" onclick="makeMove(1)"></div>
            <div class="ttt-cell" onclick="makeMove(2)"></div>
            <div class="ttt-cell" onclick="makeMove(3)"></div>
            <div class="ttt-cell" onclick="makeMove(4)"></div>
            <div class="ttt-cell" onclick="makeMove(5)"></div>
            <div class="ttt-cell" onclick="makeMove(6)"></div>
            <div class="ttt-cell" onclick="makeMove(7)"></div>
            <div class="ttt-cell" onclick="makeMove(8)"></div>
        </div>

        <!-- রিস্টার্ট -->
        <button onclick="resetTTT()" class="btn-primary" style="margin-top: 15px;">🔄 নতুন খেলা</button>
    </div>

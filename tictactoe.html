    <h1>❌⭕ টিক ট্যাক টো <span class="pro-badge">PRO</span></h1>
    <p>নাম এডিট করো, খেলো আর স্কোর জমা রাখো!</p>

    <div class="ttt-container">
        <div class="ttt-players">
            <div class="ttt-player-edit">
                <input type="text" id="playerXName" value="Player X" class="player-name-input" onchange="updatePlayerNames()">
                <span class="player-symbol-x">❌</span>
            </div>
            <span class="ttt-vs">VS</span>
            <div class="ttt-player-edit">
                <span class="player-symbol-o">⭕</span>
                <input type="text" id="playerOName" value="Player O" class="player-name-input" onchange="updatePlayerNames()">
            </div>
        </div>

        <div class="ttt-scoreboard">
            <div class="ttt-score"><span id="displayNameX">Player X</span><span id="scoreX">0</span></div>
            <div class="ttt-score"><span>ড্র</span><span id="scoreDraw">0</span></div>
            <div class="ttt-score"><span id="displayNameO">Player O</span><span id="scoreO">0</span></div>
        </div>

        <div id="tttStatus" class="ttt-status">❌ Player X-এর পালা</div>

        <div class="ttt-board" id="tttBoard">
            <div class="ttt-cell" onclick="makeMove(0)"></div>
            <div class="ttt-cell" onclick="makeMove(1)"></div>
            <div class="ttt-cell" onclick="makeMove(2)"></div>
            <div class="ttt-cell" onclick="makeMove(3)"></div>
            <div class="ttt-cell" onclick="makeMove(4)"></div>
            <div class="ttt-cell" onclick="makeMove(5)"></div>
            <div class="ttt-cell" onclick="makeMove(6)"></div>
            <div class="ttt-cell" onclick="makeMove(7)"></div>
            <div class="ttt-cell" onclick="makeMove(8)"></div>
        </div>

        <div style="display:flex;gap:10px;justify-content:center;margin-top:15px;flex-wrap:wrap;">
            <button onclick="resetTTT()" class="btn-primary">🔄 নতুন খেলা</button>
            <button onclick="resetAllScores()" class="btn-outline" style="border-color:#ef4444;color:#ef4444;">🗑️ স্কোর রিসেট</button>
        </div>

        <button id="musicToggleBtn" onclick="toggleMusic()" style="background:#22c55e;color:white;border:none;padding:10px 20px;border-radius:25px;font-size:14px;cursor:pointer;margin-top:10px;">🔊 মিউজিক বন্ধ</button>
    </div>

    <div id="confettiContainer" class="confetti-container"></div>

    <hr>
    <p style="font-size: 14px; color: #94a3b8;">&copy; ২০২৬ অভি। সমস্ত অধিকার সংরক্ষিত।</p>

</body>

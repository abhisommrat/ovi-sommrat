<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পাথর কাগজ কাঁচি - প্রো সংস্করণ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Google Translate Widget -->
<div id="google_translate_element" style="text-align: center; padding: 10px 0;"></div>
    <div id="welcomeMessage" class="welcome-message"></div>

    <div class="theme-toggle">
        <button id="themeButton" onclick="toggleTheme()">🌙 ডার্ক মোড</button>
    </div>

    <nav>
        <a href="index.html">🏠 হোম</a>
        <a href="about.html">👤 সম্পর্কে</a>
        <a href="profile.html">📷 প্রোফাইল</a>
        <a href="projects.html">📁 প্রজেক্ট</a>
        <a href="hobbies.html">🎮 শখ</a>
        <a href="diary.html">📓 ডায়েরি</a>
        <a href="game.html">🎮 গেম</a>
        <a href="contact.html">📞 যোগাযোগ</a>
    </nav>

    <h1>🪨 📄 ✂️ পাথর কাগজ কাঁচি <span class="pro-badge">PRO</span></h1>
    <p>কম্পিউটারের সাথে লড়াই করো! R=পাথর, P=কাগজ, S=কাঁচি</p>

    <!-- স্ট্যাটিস্টিকস -->
    <div class="stats-bar">
        <span>🎯 জয়ের হার: <strong id="winRate">0%</strong></span>
        <span>📊 মোট খেলা: <strong id="totalGames">0</strong></span>
        <span id="comboDisplay" class="combo-badge" style="display:none;">🔥 কম্বো x<span id="comboCount">0</span></span>
    </div>

    <!-- স্কোরবোর্ড -->
    <div class="scoreboard">
        <div class="score-box player-score">
            <span class="score-label">👤 তুমি</span>
            <span id="playerScore" class="score-number">0</span>
        </div>
        <div class="score-box draw-score">
            <span class="score-label">🤝 ড্র</span>
            <span id="drawScore" class="score-number">0</span>
        </div>
        <div class="score-box computer-score">
            <span class="score-label">💻 কম্পিউটার</span>
            <span id="computerScore" class="score-number">0</span>
        </div>
    </div>

    <!-- কাউন্টডাউন -->
    <div id="countdown" class="countdown" style="display:none;"></div>

    <!-- গেম এরিয়া -->
    <div class="game-area">
        <div class="choices">
            <button class="choice-btn" onclick="playGame('rock')" id="btnRock">
                <span class="choice-emoji">🪨</span>
                <span class="choice-text">পাথর</span>
                <span class="key-hint">R</span>
            </button>
            <button class="choice-btn" onclick="playGame('paper')" id="btnPaper">
                <span class="choice-emoji">📄</span>
                <span class="choice-text">কাগজ</span>
                <span class="key-hint">P</span>
            </button>
            <button class="choice-btn" onclick="playGame('scissors')" id="btnScissors">
                <span class="choice-emoji">✂️</span>
                <span class="choice-text">কাঁচি</span>
                <span class="key-hint">S</span>
            </button>
        </div>
    </div>

    <!-- ফলাফল -->
    <div id="resultArea" class="result-area">
        <h2 id="resultText">খেলা শুরু করো!</h2>
        <div id="battleArea" class="battle-area">
            <span id="playerChoice" class="battle-choice"></span>
            <span class="vs-text">VS</span>
            <span id="computerChoice" class="battle-choice"></span>
        </div>
    </div>

    <!-- কনফেট্টি কন্টেইনার -->
    <div id="confettiContainer" class="confetti-container"></div>

    <!-- বাটন -->
    <div style="text-align: center; margin: 20px;">
        <button onclick="resetScore()" class="reset-btn">🔄 স্কোর রিসেট</button>
        <button onclick="clearHistory()" class="reset-btn" style="background-color:#6b7280;">🗑️ ইতিহাস মুছো</button>
    </div>

    <!-- রাউন্ড হিস্ট্রি -->
    <div class="history-section">
        <h3>📜 শেষ রাউন্ড</h3>
        <div id="roundHistory" class="round-history"></div>
    </div>

    <hr>
    <p style="font-size: 14px; color: #94a3b8;">&copy; ২০২৬ অভি। সমস্ত অধিকার সংরক্ষিত।</p>

    <script src="script.js"></script>
    <!-- Google Translate Script -->
<script type="text/javascript">
function googleTranslateElementInit() {
    new google.translate.TranslateElement({
        pageLanguage: 'bn',
        includedLanguages: 'bn,en,hi,ar,ur,es,fr,de,ja,ko,zh-CN',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
        autoDisplay: false
    }, 'google_translate_element');
}
</script>
<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>

    <title>প্রো কুইজ API - OviForge</title>
    <meta name="description" content="Professional Quiz App with live questions from Open Trivia DB. Unlimited questions, never repeat!">
    <meta name="keywords" content="quiz, api, trivia, oviforge, unlimited questions">
    <meta name="author" content="OviForge">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="welcomeMessage" class="welcome-message"></div>

    <div class="theme-toggle">
        <button id="themeButton" onclick="toggleTheme()">🌙 ডার্ক মোড</button>
        <button id="siteMusicBtn" onclick="toggleSiteMusic()" style="background:#8b5cf6;color:white;border:none;padding:8px 15px;border-radius:20px;font-size:12px;cursor:pointer;margin:5px;">🔇 মিউজিক</button>
    </div>

    <nav>
        <a href="index.html">🏠 হোম</a>
        <a href="about.html">👤 সম্পর্কে</a>
        <a href="profile.html">📷 প্রোফাইল</a>
        <a href="projects.html">📁 প্রজেক্ট</a>
        <a href="quiz.html">🧠 কুইজ</a>
        <a href="contact.html">📞 যোগাযোগ</a>
        <a href="https://fiverr.com/oviforge" target="_blank">💼 Fiverr</a>
    </nav>

    <h1>🧠 প্রো কুইজ <span class="pro-badge">API</span></h1>
    <p>🌐 Open Trivia DB থেকে লাইভ প্রশ্ন | 🎲 প্রতিবার নতুন প্রশ্ন | কখনো ফুরাবে না!</p>

    <!-- সেটিংস -->
    <div class="quiz-settings" id="quizSettings">
        <div class="setting-row">
            <label>📂 ক্যাটাগরি:</label>
            <select id="categorySelect">
                <option value="9">General Knowledge</option>
                <option value="18">Science: Computers</option>
                <option value="21">Sports</option>
                <option value="22">Geography</option>
                <option value="23">History</option>
                <option value="17">Science & Nature</option>
                <option value="15">Video Games</option>
                <option value="11">Film</option>
                <option value="12">Music</option>
                <option value="27">Animals</option>
            </select>
        </div>
        <div class="setting-row">
            <label>🎯 লেভেল:</label>
            <select id="difficultySelect">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
            </select>
        </div>
        <div class="setting-row">
            <label>❓ প্রশ্ন সংখ্যা:</label>
            <select id="amountSelect">
                <option value="10">10</option>
                <option value="15">15</option>
                <option value="20" selected>20</option>
                <option value="30">30</option>
            </select>
        </div>
        <button onclick="fetchQuiz()" class="quiz-refresh-btn">🚀 শুরু করো!</button>
    </div>

    <!-- কুইজ কন্টেইনার -->
    <div class="quiz-pro-container" id="quizContainer" style="display:none;">
        <div class="quiz-top">
            <div class="quiz-stat"><span>🏆 সেরা</span><strong id="quizBest">--</strong></div>
            <div class="quiz-stat"><span>📊 স্কোর</span><strong id="quizScore">0</strong></div>
            <div class="quiz-stat"><span>❓ প্রশ্ন</span><strong id="quizQno">1/20</strong></div>
            <div class="quiz-stat"><span>📂 বিষয়</span><strong id="quizCat"></strong></div>
        </div>

        <div class="quiz-progress-wrap"><div class="quiz-progress-fill" id="quizBar"></div></div>

        <div class="quiz-timer-wrap">
            <div class="quiz-timer-fill" id="timerBar"></div>
            <span id="timerText">⏰ ২০ সে.</span>
        </div>

        <div id="quizQ" class="quiz-question-pro">প্রশ্ন লোড হচ্ছে...</div>
        <div id="quizOpts" class="quiz-options-pro"></div>

        <div class="quiz-nav-pro">
            <button id="prevBtn" class="quiz-nav-btn" onclick="prevQ()">⬅️ আগের</button>
            <button id="nextBtn" class="quiz-nav-btn quiz-nav-next" onclick="nextQ()">পরের ➡️</button>
        </div>

        <div id="quizEnd" class="quiz-result-pro" style="display:none;"></div>
    </div>

    <!-- লোডিং -->
    <div id="quizLoading" class="quiz-loading" style="display:none;">⏳ প্রশ্ন লোড হচ্ছে...</div>

    <!-- কুকি -->
    <div id="cookieConsent" class="cookie-consent">
        <span>🍪 এই ওয়েবসাইট কুকি ব্যবহার করে।</span>
        <button onclick="acceptCookies()" class="cookie-accept-btn">ঠিক আছে</button>
    </div>

    <!-- হোয়াটসঅ্যাপ -->
    <a href="https://wa.me/8801876093765" target="_blank" class="whatsapp-float" title="WhatsApp-এ কথা বলো">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="white">

    <script src="quiz-api.js"></script>
</body>
</html>

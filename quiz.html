    <h1>🧠 প্রো কুইজ</h1>
    <p>প্রতি গেমে ২০টি নতুন প্রশ্ন | কোনো রিপিট নেই!</p>

    <div class="quiz-container" id="quizContainer">
        <div class="quiz-top-bar">
            <span>🏆 সেরা: <strong id="quizBest">--</strong></span>
            <span>📊 স্কোর: <strong id="quizScore">0</strong></span>
            <span>❓ <strong id="quizQno">1/20</strong></span>
            <span>📂 <strong id="quizCat"></strong></span>
        </div>

        <div class="quiz-progress"><div class="quiz-progress-bar" id="quizBar"></div></div>

        <div class="quiz-timer">
            <div class="timer-bar" id="timerBar"></div>
            <span id="timerText">⏰ ২০ সে.</span>
        </div>

        <div id="quizQ" class="quiz-question"></div>
        <div id="quizOpts" class="quiz-options"></div>

        <div class="quiz-nav">
            <button id="prevBtn" class="btn-outline" onclick="prevQ()">⬅️ আগের</button>
            <button id="nextBtn" class="btn-primary" onclick="nextQ()">পরের ➡️</button>
        </div>

        <div id="quizEnd" class="quiz-result" style="display:none;"></div>
    </div>

    <hr>
    <p style="font-size: 14px; color: #94a3b8;">&copy; ২০২৬ অভি। সমস্ত অধিকার সংরক্ষিত।</p>

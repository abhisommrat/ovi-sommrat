    <h1>🧠 প্রো কুইজ <span class="pro-badge">PRO</span></h1>
    <p>৮টি বিষয় | ২০টি প্রশ্ন | ২০ সেকেন্ড | র‌্যান্ডম</p>

    <div class="quiz-container">
        <div class="quiz-top-bar">
            <span>🏆 সেরা: <strong id="quizBest">--</strong></span>
            <span>📊 স্কোর: <strong id="quizScore">0</strong></span>
            <span>❓ <strong id="quizQno">1/20</strong></span>
            <span>📂 <strong id="quizCategory"></strong></span>
        </div>

        <div class="quiz-progress">
            <div class="quiz-progress-bar" id="quizProgressBar"></div>
        </div>

        <div class="quiz-timer">
            <div class="timer-bar" id="timerBar"></div>
            <span id="timerText">⏰ ২০ সেকেন্ড</span>
        </div>

        <div id="quizQuestion" class="quiz-question"></div>
        <div id="quizOptions" class="quiz-options"></div>

        <div class="quiz-nav">
            <button id="prevBtn" class="btn-outline" onclick="prevQuestion()">⬅️ আগের</button>
            <button id="nextBtn" class="btn-primary" onclick="nextQuestion()">পরের ➡️</button>
        </div>

        <div id="quizResult" class="quiz-result" style="display:none;"></div>
    </div>

    <hr>
    <p style="font-size: 14px; color: #94a3b8;">&copy; ২০২৬ অভি। সমস্ত অধিকার সংরক্ষিত।</p>

</body>

    <h1>⏱️ স্টপওয়াচ</h1>
    <p>স্পেসবার চেপে স্টার্ট/পজ করো! ল্যাপ রেকর্ড করো!</p>

    <div class="stopwatch-container">
        <div class="stopwatch-display">
            <span id="swMinutes">00</span>:<span id="swSeconds">00</span>.<span id="swMilliseconds">00</span>
        </div>

        <div class="stopwatch-buttons">
            <button id="swStartBtn" class="btn-primary" onclick="swStart()">▶️ স্টার্ট</button>
            <button id="swPauseBtn" class="btn-outline" onclick="swPause()" style="display:none;">⏸️ পজ</button>
            <button onclick="swLap()" class="btn-outline">🏁 ল্যাপ</button>
            <button onclick="swReset()" style="background:#ef4444;color:white;border:none;padding:12px 20px;border-radius:25px;cursor:pointer;font-weight:bold;">🔄 রিসেট</button>
        </div>

        <div class="lap-list" id="lapList">
            <h3>📋 ল্যাপ টাইম</h3>
            <div id="laps"></div>
        </div>
    </div>

    <hr>

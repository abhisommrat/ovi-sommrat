    <span class="language-badge">🌐 <span class="current-lang">বাংলা</span></span>
    <select class="custom-lang-select" onchange="changeLanguage(this.value)">
        <option value="bn">🇧🇩 বাংলা</option>
        <option value="en">🇬🇧 English</option>
        <option value="hi">🇮🇳 हिन्दी</option>
        <option value="ar">🇸🇦 العربية</option>
        <option value="ur">🇵🇰 اردو</option>
        <option value="es">🇪🇸 Español</option>
        <option value="fr">🇫🇷 Français</option>
        <option value="de">🇩🇪 Deutsch</option>
        <option value="ja">🇯🇵 日本語</option>
        <option value="ko">🇰🇷 한국어</option>
        <option value="zh-CN">🇨🇳 中文</option>
    </select>
</div>

    <h1>📓 আমার ডিজিটাল ডায়েরি</h1>
    <p>নিচে তোমার মনের কথা লিখে রাখো। সব নোট তোমার ব্রাউজারে সেইভ থাকবে!</p>

    <div class="diary-toolbar">
        <input type="text" id="searchInput" placeholder="🔍 নোট সার্চ করো..." oninput="searchNotes()">
        <span id="noteCount">📋 মোট নোট: 0</span>
        <button onclick="deleteAllNotes()" class="clear-all-btn">🗑️ সব মুছো</button>
    </div>

    <div class="diary-input">
        <textarea id="noteInput" placeholder="এখানে তোমার নোট লিখো... (এন্টার চাপলে সেভ হবে)" oninput="updateCharCount()" onkeydown="handleEnter(event)"></textarea>
        <div class="input-footer">
            <span id="charCount">০ অক্ষর</span>
            <button onclick="addNote()" id="addBtn">➕ নোট যোগ করো</button>
        </div>
    </div>

    <div id="notesContainer"></div>

    <hr>
    <p style="font-size: 14px; color: #94a3b8;">&copy; ২০২৬ অভি। সমস্ত অধিকার সংরক্ষিত।</p>

<script type="text/javascript">
function googleTranslateElementInit() {
    new google.translate.TranslateElement({
        pageLanguage: 'bn',
        includedLanguages: 'bn,en,hi,ar,ur,es,fr,de,ja,ko,zh-CN',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
        autoDisplay: false
    }, 'google_translate_element');
}
</script>

<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ওয়েদার অ্যাপ - অভি</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>🌤️ ওয়েদার অ্যাপ</h1>
    <p>শহরের নাম ইংরেজিতে লিখো (Dhaka, London)</p>

    <div class="weather-container">
        <div class="weather-search">
            <input type="text" id="cityInput" placeholder="Dhaka">
            <button onclick="getWeather()">🔍 সার্চ</button>
        </div>
        <div class="weather-result">
            <div class="weather-icon" id="weatherIcon">🌍</div>
            <div class="weather-temp" id="weatherTemp">--°C</div>
            <div class="weather-city" id="weatherCity">শহর নির্বাচন করো</div>
            <div class="weather-desc" id="weatherDesc"></div>
        </div>
    </div>

    <script>
    const API_KEY = "ea9bb6ca05c3c25d3f110101fef73eb2";

    async function getWeather() {
        let city = document.getElementById("cityInput").value.trim();
        if (!city) { alert("শহরের নাম লিখো!"); return; }
        let url = "https://api.openweathermap.org/data/2.5/weather?q=" + city + "&appid=" + API_KEY + "&units=metric&lang=bn";
        try {
            let response = await fetch(url);
            let data = await response.json();
            if (data.cod !== 200) { alert("শহর খুঁজে পাওয়া যায়নি! ইংরেজিতে সঠিক নাম লিখো (Dhaka)"); return; }
            document.getElementById("weatherTemp").textContent = Math.round(data.main.temp) + "°C";
            document.getElementById("weatherCity").textContent = data.name + ", " + data.sys.country;
            document.getElementById("weatherDesc").textContent = data.weather[0].description;
            let icons = { "Clear": "☀️", "Clouds": "☁️", "Rain": "🌧️", "Snow": "❄️" };
            document.getElementById("weatherIcon").textContent = icons[data.weather[0].main] || "🌍";
        } catch (error) { alert("নেটওয়ার্ক সমস্যা!"); }
    }
    </script>
</body>
</html>
